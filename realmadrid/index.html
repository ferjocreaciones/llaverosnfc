<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Madrid NFC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffffff, #0b1d3a);
    color: #111;
    text-align: center;
}

.container {
    padding: 20px;
}

.card-fc {
    position: relative;
    width: 90%;
    max-width: 320px;
    height: 480px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255,215,0,0.6);
}

.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(11,29,58,0.95)),
        radial-gradient(circle at top, rgba(255,215,0,0.3), transparent 60%);
    z-index: 1;
}

.card-player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 320px;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
}

.card-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
    z-index: 3;
    color: white;
}

.card-name {
    font-size: 20px;
    font-weight: bold;
}

.card-details {
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 16px;
    margin-top: 5px;
}

.card-details span {
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 8px;
}

/* BOTONES */
.btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    background: #0b1d3a;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #09152c;
    transform: scale(1.03);
}

/* PREMIUM */
.btn-premium {
    display: block;
    width: 90%;
    max-width: 320px;
    margin: 25px auto;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #111;
    text-decoration: none;
    border-radius: 15px;
    position: relative;
    overflow: hidden;

    background: linear-gradient(135deg,#FFD700,#FFC300,#FFB300,#FFD700);

    box-shadow:
        0 0 15px rgba(255, 215, 0, 0.6),
        0 0 30px rgba(255, 215, 0, 0.4);
}

.btn-premium:hover {
    transform: scale(1.05);
}

/* SEPARADOR */
.separador {
    width: 100%;
    height: 8px;
    background: linear-gradient(90deg, #FFD700, #ffffff, #0b1d3a);
    margin: 25px 0;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="container">

<div class="card-fc">
    <div class="card-bg"></div>

    <img id="player-img" class="card-player" src="">

    <div class="card-info">
        <div id="player-name" class="card-name"></div>
        <div class="card-details">
            <span id="player-position"></span>
            <span id="player-number"></span>
        </div>
    </div>
</div>

<!-- PREMIUM -->
<div id="premium-container">
    <a id="btn-premium-1" class="btn-premium" target="_blank">⭐ Instagram</a>
    <a id="btn-premium-2" class="btn-premium" target="_blank">🎥 Video</a>
    <a id="btn-premium-3" class="btn-premium" target="_blank">📊 Perfil</a>
</div>

<div class="separador"></div>

<a class="btn" href="https://www.realmadrid.com" target="_blank">🌐 Sitio Oficial</a>
<a class="btn" href="https://www.youtube.com/@realmadrid" target="_blank">▶️ YouTube Oficial</a>
<a class="btn" href="https://www.instagram.com/realmadrid/" target="_blank">📸 Instagram Oficial</a>
<a class="btn" href="https://www.realmadrid.com/entradas" target="_blank">🎟️ Boletos</a>
<a class="btn" href="https://shop.realmadrid.com/" target="_blank">🛒 Tienda Oficial</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=real+madrid+proximo+partido" target="_blank">📅 Próximo Partido</a>
<a class="btn" href="https://www.google.com/search?q=real+madrid+calendario" target="_blank">🗓️ Calendario</a>
<a class="btn" href="https://www.google.com/search?q=tabla+la+liga" target="_blank">📊 Tabla La Liga</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=real+madrid+proximo+partido+champions" target="_blank">📅 Próximo Partido Champions</a>
<a class="btn" href="https://www.google.com/search?q=uefa+champions+league+standings" target="_blank">📅 Tabla Champions</a>
<a class="btn" href="https://www.realmadrid.com/landings/copas-de-europa-ganadas/" target="_blank">🏆 Champions Ganadas</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=palmares+real+madrid" target="_blank">🏆 Palmarés</a>
<a class="btn" href="https://www.google.com/search?q=real+madrid+vs+barcelona+historial" target="_blank">⚔️ El Clásico</a>

</div>

<script>
const jugadores = {
    mbappe: {
        nombre: "Kylian Mbappé",
        numero: "9",
        posicion: "DEL",
        imagen: "mbappe.jpg",
        premiumLinks: [
            "https://www.instagram.com/k.mbappe/",
            "https://www.youtube.com/results?search_query=mbappe+goals",
            "https://www.google.com/search?q=mbappe+estadisticas"
        ]
    },
    vinicius: {
        nombre: "Vinicius Jr",
        numero: "7",
        posicion: "DEL",
        imagen: "vinicius.jpg",
        premiumLinks: [
            "https://www.instagram.com/vinijr/",
            "https://www.youtube.com/results?search_query=vinicius+goals",
            "https://www.google.com/search?q=vinicius+estadisticas"
        ]
    },
    rodrygo: {
        nombre: "Rodrygo Goes",
        numero: "11",
        posicion: "DEL",
        imagen: "rodrygo.jpg",
        premiumLinks: [
            "https://www.instagram.com/rodrygogoes/",
            "https://www.youtube.com/results?search_query=rodrygo+goals",
            "https://www.google.com/search?q=rodrygo+estadisticas"
        ]
    },
    valverde: {
        nombre: "Fede Valverde",
        numero: "8",
        posicion: "MED",
        imagen: "valverde.jpg",
        premiumLinks: [
            "https://www.instagram.com/fedevalverde/",
            "https://www.youtube.com/results?search_query=valverde+goals",
            "https://www.google.com/search?q=valverde+estadisticas"
        ]
    }
};

const params = new URLSearchParams(window.location.search);
const jugador = params.get("jugador");

if (jugadores[jugador]) {
    document.getElementById("player-name").innerText = jugadores[jugador].nombre;
    document.getElementById("player-number").innerText = jugadores[jugador].numero;
    document.getElementById("player-position").innerText = jugadores[jugador].posicion;
    document.getElementById("player-img").src = jugadores[jugador].imagen;

    document.getElementById("btn-premium-1").href = jugadores[jugador].premiumLinks[0];
    document.getElementById("btn-premium-2").href = jugadores[jugador].premiumLinks[1];
    document.getElementById("btn-premium-3").href = jugadores[jugador].premiumLinks[2];

} else {
    document.getElementById("player-name").innerText = "Real Madrid";
    document.getElementById("player-number").innerText = "⚽";
}
</script>

</body>
</html>
