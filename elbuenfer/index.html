<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Buen Fer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;

    background-color: #0a0a0a;

    background-image: 
        linear-gradient(120deg,#0a0a0a,#111,#0a0a0a,#111,#0a0a0a);

    background-size: 300%;
    animation: blackMetal 12s linear infinite;

    overflow-x: hidden;
}

@keyframes blackMetal {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

/* OVERLAY */
.overlay {
    background: rgba(0,0,0,0.9);
    min-height: 100vh;
    padding: 30px 20px;
    position: relative;
}

/* 🌊 ONDAS */
.wave {
    position: absolute;
    width: 200%;
    height: 200px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
    top: 30%;
    left: -50%;
    transform: rotate(-10deg);
    animation: waveMove 6s linear infinite;
}

.wave2 {
    top: 60%;
    animation-duration: 9s;
    opacity: 0.4;
}

@keyframes waveMove {
    0% { transform: translateX(-30%) rotate(-10deg); }
    100% { transform: translateX(30%) rotate(-10deg); }
}

/* LOGO */
.logo-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.logo-metal {
    width: 180px;
    height: auto;

    filter: drop-shadow(0 0 12px rgba(255,255,255,0.6));

    animation: glowWhite 2s ease-in-out infinite alternate;
}

@keyframes glowWhite {
    0% {
        filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
    }
    100% {
        filter: drop-shadow(0 0 18px rgba(255,255,255,0.9));
    }
}

/* TEXTO */
.title-main {
    font-size: 42px;
    font-weight: bold;

    background: linear-gradient(
        120deg,
        #FFD700,
        #fff3b0,
        #FFD700,
        #b89600,
        #FFD700
    );

    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    -webkit-text-stroke: 1.2px rgba(255,255,255,0.7);

    animation: goldShine 4s linear infinite;
}

.title-sub {
    font-size: 14px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 30px;
}

@keyframes goldShine {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

/* BOTONES */
.btn-premium {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;

    width: 90%;
    max-width: 320px;
    margin: 20px auto;
    padding: 15px;

    font-weight: bold;
    font-size: 16px;
    color: #111;
    text-decoration: none;

    border-radius: 15px;
    position: relative;
    overflow: hidden;

    background: linear-gradient(
        135deg,
        #FFD700,
        #fff3b0,
        #FFC300,
        #FFD700
    );

    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);

    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.6),
        0 0 25px rgba(255,215,0,0.6);

    transition: 0.3s;
}

.btn-premium:hover {
    transform: scale(1.05);
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.8),
        0 0 40px rgba(255,215,0,1);
}

.btn-premium::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 45%;
    width: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.6), transparent);
}

.btn-premium::before {
    content: "";
    position: absolute;
    top: 0;
    left: -80%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.5);
    transform: skewX(-20deg);
    animation: brillo 3s infinite;
}

@keyframes brillo {
    0% { left: -80%; }
    100% { left: 130%; }
}

/* ICONOS */
.icon {
    width: 22px;
    height: 22px;
    fill: #111;
}

/* ENTRADA */
.fade-in {
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="overlay fade-in">

    <div class="wave"></div>
    <div class="wave wave2"></div>

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo.svg" class="logo-metal">
    </div>

    <div class="title-main">EL BUEN FER</div>
    <div class="title-sub">PROTECTORES GDL</div>

    <!-- INSTAGRAM -->
    <a href="https://www.instagram.com/elbuenfergdl?igsh=MTNlMzJuMHl1a3p3dA==" target="_blank" class="btn-premium">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 4.5A5.5 5.5 0 1112 17a5.5 5.5 0 010-11zm0 2A3.5 3.5 0 1012 15a3.5 3.5 0 000-7zm5.75-.25a1.25 1.25 0 11-2.5 0 1.25 1.25 0 012.5 0z"/>
        </svg>
        Instagram
    </a>

    <!-- FACEBOOK -->
    <a href="https://www.facebook.com/elbuenferprotectoresgdl1/" target="_blank" class="btn-premium">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M22 12a10 10 0 10-11.6 9.9v-7h-2v-2.9h2V9.5c0-2 1.2-3.1 3-3.1.9 0 1.8.1 1.8.1v2h-1c-1 0-1.3.6-1.3 1.2v1.5h2.3l-.4 2.9h-1.9v7A10 10 0 0022 12z"/>
        </svg>
        Facebook
    </a>

    <!-- LLAMADA -->
    <a href="tel:3312345678" class="btn-premium">
        📞 Llamar ahora
    </a>

</div>

</body>
</html>
